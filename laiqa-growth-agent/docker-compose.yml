version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    restart: always
    environment:
      POSTGRES_DB: laiqa
      POSTGRES_USER: laiqa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laiqa"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    restart: always
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS: ${CHROMA_AUTH_TOKEN}
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: chromadb.auth.token_authn.TokenConfigServerAuthCredentialsProvider
      CHROMA_SERVER_AUTH_PROVIDER: chromadb.auth.token_authn.TokenAuthenticationServerProvider
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  sanitiser:
    build: ./services/sanitiser
    restart: unless-stopped
    restart: always
    environment:
      PORT: 8001
    ports:
      - "8001:8001"

  vector-bridge:
    build: ./services/vector-bridge
    restart: unless-stopped
    restart: always
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_AUTH_TOKEN: ${CHROMA_AUTH_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      - chroma

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    restart: always
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: laiqa
      DB_POSTGRESDB_USER: laiqa
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: Asia/Kolkata
      N8N_EXECUTIONS_DATA_SAVE_ON_ERROR: all
      N8N_EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
  n8n_data:
